<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyG2 Nav · V2 — Current Design</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Figtree', sans-serif; }
    body { margin: 0; }
  </style>
</head>
<body class="bg-[#f5f4fb] h-screen flex flex-col overflow-hidden">

  <!-- Top header bar -->
  <header class="bg-white flex items-center h-14 px-4 gap-3 flex-shrink-0"
    style="border-bottom: 0.5px solid #dfdfe2; box-shadow: 0 1px 1px rgba(32,31,35,0.04);">

    <!-- App name -->
    <div class="flex items-center gap-2 flex-shrink-0">
      <span class="text-base font-bold text-[#201f23]">MyG2</span>
      <button class="p-1 rounded hover:bg-gray-100 text-gray-400">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
      </button>
    </div>

    <!-- Divider -->
    <div class="w-px h-6 bg-[#dfdfe2] flex-shrink-0"></div>

    <!-- Product / company switcher -->
    <button class="flex items-center gap-2 px-2 py-1 rounded-lg hover:bg-gray-50 flex-shrink-0">
      <div class="w-7 h-7 rounded-md flex items-center justify-center flex-shrink-0" style="background: #5746b2;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="3" width="8" height="8" rx="1" fill="white" fill-opacity="0.9"/>
          <rect x="13" y="3" width="8" height="8" rx="1" fill="white" fill-opacity="0.6"/>
          <rect x="3" y="13" width="8" height="8" rx="1" fill="white" fill-opacity="0.6"/>
          <rect x="13" y="13" width="8" height="8" rx="1" fill="white" fill-opacity="0.3"/>
        </svg>
      </div>
      <span class="text-sm font-semibold text-[#201f23]">Acme Inc.</span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2.5" stroke-linecap="round">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </button>

    <!-- Spacer -->
    <div class="flex-1"></div>

    <!-- Search -->
    <div class="relative flex-shrink-0 w-64">
      <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
      </div>
      <input type="text" placeholder="Quick nav..."
        class="w-full h-9 bg-[#fafafa] border border-[#dfdfe2] rounded-lg pl-8 pr-3 text-sm text-[#6f6d78] focus:outline-none focus:border-[#5746b2] focus:ring-1 focus:ring-[#5746b2]"
        style="border-width: 0.5px; font-family: 'Figtree', sans-serif;">
    </div>

    <!-- Help -->
    <button class="w-8 h-8 rounded-full bg-blue-50 flex items-center justify-center flex-shrink-0 hover:bg-blue-100 transition-colors ml-1">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/>
        <circle cx="12" cy="17" r="0.5" fill="#3b82f6"/>
      </svg>
    </button>

  </header>

  <!-- Body: sidebar + content -->
  <div class="flex flex-1 overflow-hidden">

    <!-- Left sidebar -->
    <nav class="bg-white flex flex-col flex-shrink-0"
      style="width: 180px; border-right: 0.5px solid #dfdfe2; box-shadow: 4px 0 4px rgba(32,31,35,0.04);">

      <div class="flex flex-col flex-1 px-2 pt-3 pb-2">

        <!-- Nav items -->
        <div class="flex flex-col gap-0.5">

          <!-- Dashboard -->
          <a href="#"
            onmouseenter="showFlyout(this, 'dashboard')"
            onmouseleave="scheduleHide()"
            class="flex items-center gap-2.5 px-2.5 py-2 rounded-lg text-sm text-[#4b4a52] hover:bg-gray-50 hover:text-[#201f23] group transition-colors">
            <span class="flex-shrink-0 text-gray-400 group-hover:text-gray-600">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round">
                <rect x="3" y="3" width="7" height="7" rx="1.5"/>
                <rect x="14" y="3" width="7" height="7" rx="1.5"/>
                <rect x="3" y="14" width="7" height="7" rx="1.5"/>
                <rect x="14" y="14" width="7" height="7" rx="1.5"/>
              </svg>
            </span>
            <span class="flex-1">Dashboard</span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="2.5" stroke-linecap="round" class="flex-shrink-0 group-hover:stroke-gray-400 transition-colors">
              <path d="M9 18l6-6-6-6"/>
            </svg>
          </a>

          <!-- Your G2 Profile -->
          <a href="#"
            onmouseenter="showFlyout(this, 'profile')"
            onmouseleave="scheduleHide()"
            class="flex items-center gap-2.5 px-2.5 py-2 rounded-lg text-sm text-[#4b4a52] hover:bg-gray-50 hover:text-[#201f23] group transition-colors">
            <span class="flex-shrink-0 text-gray-400 group-hover:text-gray-600">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round">
                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <span class="flex-1">Your G2 Profile</span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="2.5" stroke-linecap="round" class="flex-shrink-0 group-hover:stroke-gray-400 transition-colors">
              <path d="M9 18l6-6-6-6"/>
            </svg>
          </a>

          <!-- Presence & Trust — active -->
          <a href="#"
            onmouseenter="showFlyout(this, 'presence')"
            onmouseleave="scheduleHide()"
            class="flex items-center gap-2.5 px-2.5 py-2 rounded-lg text-sm font-semibold text-[#201f23] bg-gray-100 group transition-colors">
            <span class="flex-shrink-0 text-[#5746b2]">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
              </svg>
            </span>
            <span class="flex-1">Presence &amp; Trust</span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#5746b2" stroke-width="2.5" stroke-linecap="round" class="flex-shrink-0 opacity-60">
              <path d="M9 18l6-6-6-6"/>
            </svg>
          </a>

          <!-- Demand Generation -->
          <a href="#"
            onmouseenter="showFlyout(this, 'demand')"
            onmouseleave="scheduleHide()"
            class="flex items-center gap-2.5 px-2.5 py-2 rounded-lg text-sm text-[#4b4a52] hover:bg-gray-50 hover:text-[#201f23] group transition-colors">
            <span class="flex-shrink-0 text-gray-400 group-hover:text-gray-600">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
              </svg>
            </span>
            <span class="flex-1">Demand Generation</span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="2.5" stroke-linecap="round" class="flex-shrink-0 group-hover:stroke-gray-400 transition-colors">
              <path d="M9 18l6-6-6-6"/>
            </svg>
          </a>

          <!-- Insights -->
          <a href="#"
            onmouseenter="showFlyout(this, 'insights')"
            onmouseleave="scheduleHide()"
            class="flex items-center gap-2.5 px-2.5 py-2 rounded-lg text-sm text-[#4b4a52] hover:bg-gray-50 hover:text-[#201f23] group transition-colors">
            <span class="flex-shrink-0 text-gray-400 group-hover:text-gray-600">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round">
                <line x1="18" y1="20" x2="18" y2="10"/>
                <line x1="12" y1="20" x2="12" y2="4"/>
                <line x1="6" y1="20" x2="6" y2="14"/>
                <line x1="2" y1="20" x2="22" y2="20"/>
              </svg>
            </span>
            <span class="flex-1">Insights</span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="2.5" stroke-linecap="round" class="flex-shrink-0 group-hover:stroke-gray-400 transition-colors">
              <path d="M9 18l6-6-6-6"/>
            </svg>
          </a>

          <!-- Gather Social Proof -->
          <a href="#"
            onmouseenter="showFlyout(this, 'social')"
            onmouseleave="scheduleHide()"
            class="flex items-center gap-2.5 px-2.5 py-2 rounded-lg text-sm text-[#4b4a52] hover:bg-gray-50 hover:text-[#201f23] group transition-colors">
            <span class="flex-shrink-0 text-gray-400 group-hover:text-gray-600">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
              </svg>
            </span>
            <span class="flex-1">Gather Social proof</span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="2.5" stroke-linecap="round" class="flex-shrink-0 group-hover:stroke-gray-400 transition-colors">
              <path d="M9 18l6-6-6-6"/>
            </svg>
          </a>

          <!-- Account -->
          <a href="#"
            onmouseenter="showFlyout(this, 'account')"
            onmouseleave="scheduleHide()"
            class="flex items-center gap-2.5 px-2.5 py-2 rounded-lg text-sm text-[#4b4a52] hover:bg-gray-50 hover:text-[#201f23] group transition-colors">
            <span class="flex-shrink-0 text-gray-400 group-hover:text-gray-600">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round">
                <circle cx="12" cy="8" r="4"/>
                <path d="M6 20v-2a4 4 0 014-4h4a4 4 0 014 4v2"/>
                <circle cx="19" cy="6" r="3"/>
                <line x1="19" y1="4" x2="19" y2="8"/>
                <line x1="17" y1="6" x2="21" y2="6"/>
              </svg>
            </span>
            <span class="flex-1">Account</span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="2.5" stroke-linecap="round" class="flex-shrink-0 group-hover:stroke-gray-400 transition-colors">
              <path d="M9 18l6-6-6-6"/>
            </svg>
          </a>

          <!-- Help -->
          <a href="#"
            onmouseenter="showFlyout(this, 'help')"
            onmouseleave="scheduleHide()"
            class="flex items-center gap-2.5 px-2.5 py-2 rounded-lg text-sm text-[#4b4a52] hover:bg-gray-50 hover:text-[#201f23] group transition-colors">
            <span class="flex-shrink-0 text-gray-400 group-hover:text-gray-600">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round">
                <circle cx="12" cy="12" r="10"/>
                <path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/>
                <circle cx="12" cy="17" r="0.5" fill="currentColor"/>
              </svg>
            </span>
            <span class="flex-1">Help</span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="2.5" stroke-linecap="round" class="flex-shrink-0 group-hover:stroke-gray-400 transition-colors">
              <path d="M9 18l6-6-6-6"/>
            </svg>
          </a>

        </div>
      </div>

      <!-- Bottom section -->
      <div class="flex-shrink-0 border-t border-[#dfdfe2] p-3 flex flex-col gap-2" style="border-width: 0.5px;">
        <!-- Visit public profile -->
        <a href="#" class="flex items-center justify-between px-2.5 py-2 rounded-lg text-xs font-semibold text-[#4b4a52] border border-[#dfdfe2] hover:bg-gray-50 hover:border-gray-300 transition-colors">
          <span>Visit your G2 public profile</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
            <polyline points="15 3 21 3 21 9"/>
            <line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
        </a>
        <!-- User info -->
        <div class="flex items-center gap-2 px-1 py-1">
          <div class="w-7 h-7 rounded-full bg-[#5746b2] flex items-center justify-center flex-shrink-0 overflow-hidden">
            <img src="https://i.pravatar.cc/28?u=olivia-g2" alt="Olivia" class="w-full h-full object-cover" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <span style="display:none" class="w-full h-full items-center justify-center text-white text-xs font-semibold">OA</span>
          </div>
          <span class="text-xs text-[#4b4a52] font-semibold">Hi, Olivia A.</span>
        </div>
      </div>

    </nav>

    <!-- Main content area -->
    <main class="flex-1 bg-white overflow-auto">
      <div class="p-8">
        <!-- Top row: breadcrumb + link -->
        <div class="flex items-center justify-between mb-6">
          <p class="text-sm text-[#6f6d78]">
            <a href="#" class="hover:text-[#5746b2]">Home</a>
            <span class="mx-1 text-[#b0afb6]">/</span>
            <a href="#" class="hover:text-[#5746b2]">Presence &amp; Trust</a>
            <span class="mx-1 text-[#b0afb6]">:</span>
            <span class="text-[#201f23]">Manage your G2 Profile</span>
          </p>
          <a href="#" class="text-sm font-semibold text-[#5746b2] hover:underline flex items-center gap-1">
            Learn more about Paid Promotions
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
              <polyline points="15 3 21 3 21 9"/>
              <line x1="10" y1="14" x2="21" y2="3"/>
            </svg>
          </a>
        </div>

        <!-- Page title -->
        <h1 class="text-2xl font-bold text-[#201f23]">Manage your G2 Profile</h1>

        <!-- Placeholder content area -->
        <div class="mt-8 bg-gray-50 rounded-xl border border-dashed border-gray-200 h-96 flex items-center justify-center">
          <p class="text-sm text-gray-400">Page content</p>
        </div>
      </div>
    </main>

  </div>

  <!-- Flyout submenu panel (shared, positioned by JS) -->
  <div id="v2-flyout"
    onmouseenter="cancelHide()"
    onmouseleave="scheduleHide()"
    style="display: none; position: fixed; z-index: 100; width: 200px;
      background: white; border-radius: 12px;
      border: 0.5px solid #dfdfe2;
      box-shadow: 0 4px 20px rgba(32,31,35,0.12), 0 0 0 0.5px rgba(32,31,35,0.06);">
    <div id="v2-flyout-label"
      style="padding: 10px 12px 4px; font-size: 10px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: #9ca3af;">
    </div>
    <div id="v2-flyout-items" style="padding: 2px 4px 6px;"></div>
  </div>

  <!-- Back to index -->
  <a href="index.html" class="fixed bottom-4 right-4 text-xs text-gray-400 hover:text-gray-600 bg-white rounded-full px-3 py-1.5 border border-gray-200 shadow-sm transition-colors">
    ← All versions
  </a>

  <script>
    const SUBNAV = {
      dashboard: {
        label: 'Dashboard',
        items: ['Overview', 'Recent Activity', 'Performance Snapshot', 'Quick Stats'],
      },
      profile: {
        label: 'Your G2 Profile',
        items: ['Profile Setup', 'Preview Profile', 'G2 Badges', 'Profile Analytics'],
      },
      presence: {
        label: 'Presence & Trust',
        items: ['Manage Profile', 'Review Widgets', 'Competitive Intel', 'Comparison Pages'],
      },
      demand: {
        label: 'Demand Generation',
        items: ['Lead Gen Reports', 'Sponsored Content', 'Intent Signals', 'Content Syndication'],
      },
      insights: {
        label: 'Insights',
        items: ['Market Reports', 'Competitive Analysis', 'Buyer Surveys', 'Trend Tracker'],
      },
      social: {
        label: 'Gather Social Proof',
        items: ['Review Campaigns', 'Review Widget', 'Customer Testimonials'],
      },
      account: {
        label: 'Account',
        items: ['Users & Permissions', 'Billing & Plan', 'Notifications', 'SSO Settings'],
      },
      help: {
        label: 'Help',
        items: ['Documentation', 'Video Tutorials', 'Contact Support', 'System Status'],
      },
    };

    let hideTimer = null;

    function showFlyout(el, key) {
      cancelHide();
      const data = SUBNAV[key];
      if (!data) return;

      const flyout = document.getElementById('v2-flyout');
      document.getElementById('v2-flyout-label').textContent = data.label;
      document.getElementById('v2-flyout-items').innerHTML = data.items.map(item =>
        `<a href="#" style="display:flex; align-items:center; gap:8px; padding:7px 10px; font-size:13px; color:#4b4a52; border-radius:8px; text-decoration:none; transition:background 0.1s;"
          onmouseover="this.style.background='#f9fafb'; this.style.color='#201f23';"
          onmouseout="this.style.background=''; this.style.color='#4b4a52';">
          ${item}
        </a>`
      ).join('');

      const rect = el.getBoundingClientRect();
      const top = Math.min(rect.top, window.innerHeight - (data.items.length * 38 + 48) - 8);

      flyout.style.top = top + 'px';
      flyout.style.left = (rect.right + 4) + 'px';
      flyout.style.display = 'block';
    }

    function scheduleHide() {
      hideTimer = setTimeout(() => {
        document.getElementById('v2-flyout').style.display = 'none';
      }, 120);
    }

    function cancelHide() {
      if (hideTimer) {
        clearTimeout(hideTimer);
        hideTimer = null;
      }
    }
  </script>

</body>
</html>
