<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyG2 Nav · V1 — Icon Sidebar</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Figtree', sans-serif; }
    body { margin: 0; }
  </style>
</head>
<body class="bg-[#f5f4fb] h-screen flex overflow-hidden">

  <!-- Icon-only collapsed sidebar (48px) -->
  <aside class="bg-white flex flex-col items-center py-0 flex-shrink-0 h-full"
    style="width:48px; box-shadow: 4px 0 4px rgba(32,31,35,0.04), 0 0 1px rgba(32,31,35,0.20); border-right: 0.5px solid #dfdfe2;">

    <!-- G2 Logo -->
    <div class="w-12 h-12 flex items-center justify-center flex-shrink-0">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
        <circle cx="18" cy="18" r="18" fill="#ff492c"/>
        <text x="18" y="24" text-anchor="middle" font-family="Figtree, sans-serif" font-weight="800" font-size="18" fill="white">G</text>
      </svg>
    </div>

    <!-- Product switcher (Trello) -->
    <div class="px-2 pb-1 w-full">
      <div class="w-8 h-8 rounded-lg overflow-hidden mx-auto">
        <svg viewBox="0 0 32 32" width="32" height="32">
          <rect width="32" height="32" fill="#0052CC" rx="5"/>
          <rect x="5" y="5" width="9" height="14" rx="2.5" fill="white"/>
          <rect x="18" y="5" width="9" height="9" rx="2.5" fill="white"/>
        </svg>
      </div>
    </div>

    <!-- Divider -->
    <div class="w-6 h-px bg-[#dfdfe2] my-2 flex-shrink-0"></div>

    <!-- Nav items -->
    <div class="flex flex-col gap-1 px-1.5 w-full">

      <!-- Bookmarks — selected -->
      <button class="w-full h-12 rounded-lg flex items-center justify-center bg-[#f2f0f9]" title="Bookmarks">
        <div class="w-8 h-8 rounded-lg bg-white flex items-center justify-center flex-shrink-0">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z" fill="#ff492c" fill-opacity="0.2" stroke="#ff492c" stroke-width="1.5" stroke-linejoin="round"/>
            <rect x="9" y="3" width="6" height="7" rx="0.5" fill="#ff492c"/>
          </svg>
        </div>
      </button>

      <!-- Dashboard -->
      <button class="w-full h-12 rounded-lg flex items-center justify-center hover:bg-gray-50" title="Dashboard">
        <div class="w-8 h-8 rounded-lg bg-[#f2f2f3] flex items-center justify-center flex-shrink-0">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="3" width="8" height="8" rx="1.5" fill="#7c6ce6"/>
            <rect x="13" y="3" width="8" height="8" rx="1.5" fill="#7c6ce6" fill-opacity="0.5"/>
            <rect x="3" y="13" width="8" height="8" rx="1.5" fill="#7c6ce6" fill-opacity="0.5"/>
            <rect x="13" y="13" width="8" height="8" rx="1.5" fill="#7c6ce6" fill-opacity="0.3"/>
          </svg>
        </div>
      </button>

      <!-- Review Growth -->
      <button class="w-full h-12 rounded-lg flex items-center justify-center hover:bg-gray-50" title="Review Growth">
        <div class="w-8 h-8 rounded-lg bg-[#f2f2f3] flex items-center justify-center flex-shrink-0">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="14" width="4" height="7" rx="1" fill="#fbbf24"/>
            <rect x="10" y="9" width="4" height="12" rx="1" fill="#fbbf24" fill-opacity="0.7"/>
            <rect x="17" y="5" width="4" height="16" rx="1" fill="#fbbf24" fill-opacity="0.4"/>
            <path d="M5 13 L12 8 L19 4" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
      </button>

      <!-- Brand & Marketing -->
      <button class="w-full h-12 rounded-lg flex items-center justify-center hover:bg-gray-50" title="Brand &amp; Marketing">
        <div class="w-8 h-8 rounded-lg bg-[#f2f2f3] flex items-center justify-center flex-shrink-0">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" fill="#06b6d4" fill-opacity="0.2" stroke="#06b6d4" stroke-width="1.5" stroke-linejoin="round"/>
            <circle cx="9" cy="10" r="1.5" fill="#06b6d4"/>
            <circle cx="12" cy="10" r="1.5" fill="#06b6d4"/>
            <circle cx="15" cy="10" r="1.5" fill="#06b6d4"/>
          </svg>
        </div>
      </button>

      <!-- Buyer Intent -->
      <button class="w-full h-12 rounded-lg flex items-center justify-center hover:bg-gray-50" title="Buyer Intent">
        <div class="w-8 h-8 rounded-lg bg-[#f2f2f3] flex items-center justify-center flex-shrink-0">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L4 8.5l2 12h12l2-12z" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M4 8.5h16" stroke="#6366f1" stroke-width="1.5"/>
            <path d="M8 8.5L12 2l4 6.5" stroke="#6366f1" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M12 22v-4M9.5 19h5" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
      </button>

      <!-- Market Intelligence -->
      <button class="w-full h-12 rounded-lg flex items-center justify-center hover:bg-gray-50" title="Market Intelligence">
        <div class="w-8 h-8 rounded-lg bg-[#f2f2f3] flex items-center justify-center flex-shrink-0">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="9" fill="#3b82f6" fill-opacity="0.12" stroke="#3b82f6" stroke-width="1.5"/>
            <path d="M3 12h18" stroke="#3b82f6" stroke-width="1.25"/>
            <ellipse cx="12" cy="12" rx="4.5" ry="9" stroke="#3b82f6" stroke-width="1.25"/>
          </svg>
        </div>
      </button>

      <!-- Integrations -->
      <button class="w-full h-12 rounded-lg flex items-center justify-center hover:bg-gray-50" title="Integrations">
        <div class="w-8 h-8 rounded-lg bg-[#f2f2f3] flex items-center justify-center flex-shrink-0">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M4 6h8v4H8v4H4V6z" fill="#f97316" fill-opacity="0.2" stroke="#f97316" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M12 6h8v8h-4v4h-4V6z" fill="#f97316" fill-opacity="0.15" stroke="#f97316" stroke-width="1.5" stroke-linejoin="round"/>
            <rect x="7.5" y="10" width="5" height="5" rx="1" fill="#f97316" fill-opacity="0.4"/>
          </svg>
        </div>
      </button>

    </div>

    <!-- Divider -->
    <div class="w-6 h-px bg-[#dfdfe2] my-2 flex-shrink-0"></div>

    <!-- Settings -->
    <div class="px-1.5 w-full">
      <button class="w-full h-12 rounded-lg flex items-center justify-center hover:bg-gray-50" title="Settings">
        <div class="w-8 h-8 rounded-lg bg-[#f2f2f3] flex items-center justify-center flex-shrink-0">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.5">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
        </div>
      </button>
    </div>

    <!-- Spacer -->
    <div class="flex-1"></div>

    <!-- Expand/collapse + logout -->
    <div class="px-1.5 pb-3 w-full flex flex-col gap-1">
      <button class="w-full h-8 rounded-full flex items-center justify-center bg-[#f2f2f3] border border-[#dfdfe2] hover:bg-gray-200 transition-colors mx-auto" style="max-width:32px; margin-left: auto; margin-right: auto;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2.5" stroke-linecap="round">
          <path d="M9 18l6-6-6-6"/>
        </svg>
      </button>
    </div>
  </aside>

  <!-- Main content area -->
  <main class="flex-1 relative overflow-hidden">

    <!-- AI sparkle centered in content area -->
    <div class="absolute inset-0 flex items-center justify-center">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <!-- Large star -->
        <path d="M20 4 L22.5 17.5 L36 20 L22.5 22.5 L20 36 L17.5 22.5 L4 20 L17.5 17.5 Z" fill="#ff492c"/>
        <!-- Small star -->
        <path d="M31 10 L32 15 L37 16 L32 17 L31 22 L30 17 L25 16 L30 15 Z" fill="#ff492c"/>
      </svg>
    </div>

    <!-- Floating utility bar — top right -->
    <div class="absolute top-5 right-4 flex items-center bg-white rounded-xl px-3 py-2 gap-4"
      style="box-shadow: 0 0 1px rgba(32,31,35,0.32), 0 4px 4px rgba(32,31,35,0.04); border: 0.5px solid #dfdfe2;">

      <!-- Help -->
      <button class="w-7 h-7 rounded-full bg-blue-100 flex items-center justify-center flex-shrink-0 hover:bg-blue-200 transition-colors">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/>
          <circle cx="12" cy="17" r="0.5" fill="#3b82f6"/>
        </svg>
      </button>

      <!-- Notifications with badge -->
      <button class="relative flex-shrink-0 hover:opacity-80">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#374151" stroke-width="1.8" stroke-linecap="round">
          <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 01-3.46 0"/>
        </svg>
        <span class="absolute -top-1 -right-1.5 w-4 h-4 bg-[#ff492c] rounded-full border border-white flex items-center justify-center">
          <span class="text-white text-[9px] font-bold leading-none">1</span>
        </span>
      </button>

      <!-- Language -->
      <button class="flex items-center gap-1.5 text-xs font-semibold text-[#201f23] flex-shrink-0 hover:text-gray-600">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#374151" stroke-width="1.8">
          <circle cx="12" cy="12" r="10"/>
          <path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
        </svg>
        EN
      </button>

      <!-- Divider -->
      <div class="w-px h-5 bg-[#dfdfe2] flex-shrink-0"></div>

      <!-- Account: avatar + name + chevron -->
      <button class="flex items-center gap-2 flex-shrink-0 hover:opacity-80">
        <div class="w-8 h-8 rounded-full bg-[#5746b2] flex items-center justify-center text-white text-xs font-semibold border-2 border-white flex-shrink-0 overflow-hidden">
          <img src="https://i.pravatar.cc/32?u=olivia-g2" alt="Olivia" class="w-full h-full object-cover" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
          <span style="display:none" class="w-full h-full items-center justify-center text-white text-xs font-semibold">OA</span>
        </div>
        <span class="text-sm font-semibold text-[#201f23]">Hi, Olivia</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2.5" stroke-linecap="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
    </div>

    <!-- G2.ai chat prompt — bottom right -->
    <div class="absolute bottom-5 right-4"
      style="box-shadow: 0 0 1px rgba(32,31,35,0.32), 0 18px 28px -4px rgba(32,31,35,0.15); border-radius: 12px;">
      <div class="bg-white rounded-xl p-3 w-[380px]">
        <div class="bg-[#fafafa] border border-[#dfdfe2] rounded-full h-12 flex items-center pl-2 pr-1 gap-2" style="border-width: 0.5px;">
          <!-- AI sparkle icon -->
          <div class="flex-shrink-0 flex items-center justify-center w-5 h-5">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M12 3L13.2 10.8L21 12L13.2 13.2L12 21L10.8 13.2L3 12L10.8 10.8Z" fill="#ff492c"/>
              <path d="M19 5L19.6 8L22 8.6L19.6 9.2L19 12L18.4 9.2L16 8.6L18.4 8Z" fill="#ff492c"/>
            </svg>
          </div>
          <!-- Placeholder text -->
          <div class="flex-1 min-w-0">
            <span class="text-[#6f6d78] text-sm">Ask, find, or create with </span>
            <span class="text-[#ff492c] text-sm font-bold">G2.ai</span>
            <span class="text-[#6f6d78] text-sm">...</span>
          </div>
          <!-- Mic button -->
          <button class="w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0" style="background: linear-gradient(137deg, rgba(87,70,178,0.14) 14%, rgba(255,73,44,0.14) 88%), white;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#374151" stroke-width="2" stroke-linecap="round">
              <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
              <path d="M19 10v2a7 7 0 01-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/>
              <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

  </main>

  <!-- Back to index -->
  <a href="index.html" class="fixed bottom-4 left-16 text-xs text-gray-400 hover:text-gray-600 bg-white rounded-full px-3 py-1.5 border border-gray-200 shadow-sm transition-colors">
    ← All versions
  </a>

</body>
</html>
