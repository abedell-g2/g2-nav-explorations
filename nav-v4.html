<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyG2 Nav · V4 — Card-First Nav</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Figtree', sans-serif; }
    body { margin: 0; }

    #sidebar {
      width: 48px;
      flex-shrink: 0;
      overflow: hidden;
      transition: width 0.32s cubic-bezier(0.4,0,0.2,1), opacity 0.22s ease;
    }
    #sidebar.is-collapsed { width: 0; opacity: 0; }

    #home-view { transition: opacity 0.2s ease; }

    #section-view {
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
    }
    #section-view.is-visible { opacity: 1; pointer-events: auto; }

    #utility-bar { transition: opacity 0.2s ease; }
    #utility-bar.is-hidden { opacity: 0; pointer-events: none; }

    .nav-card {
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    }
    .nav-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(32,31,35,0.09);
      border-color: #e0dcf7;
    }
    .nav-card:active { transform: translateY(0px); }

    .tab-pill {
      transition: background-color 0.12s ease, color 0.12s ease;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .tab-pill.is-active { background-color: #ebe9f6; color: #5746b2; }

    #tab-bar { scrollbar-width: none; }
    #tab-bar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="h-screen overflow-hidden">
<div id="app" class="h-full flex overflow-hidden bg-[#f5f4fb]">

  <!-- ════════════════════════
       SIDEBAR — icon-only 48px
  ════════════════════════ -->
  <aside id="sidebar" class="bg-white flex flex-col items-center h-full"
    style="box-shadow: 4px 0 4px rgba(32,31,35,0.04), 0 0 1px rgba(32,31,35,0.20); border-right: 0.5px solid #dfdfe2;">

    <!-- G2 Logo -->
    <div class="w-12 h-12 flex items-center justify-center flex-shrink-0">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
        <circle cx="18" cy="18" r="18" fill="#ff492c"/>
        <text x="18" y="24" text-anchor="middle" font-family="Figtree,sans-serif" font-weight="800" font-size="18" fill="white">G</text>
      </svg>
    </div>

    <!-- Product (Trello) -->
    <div class="px-2 pb-1 w-full">
      <div class="w-8 h-8 rounded-lg overflow-hidden mx-auto">
        <svg viewBox="0 0 32 32" width="32" height="32">
          <rect width="32" height="32" fill="#0052CC" rx="5"/>
          <rect x="5" y="5" width="9" height="14" rx="2.5" fill="white"/>
          <rect x="18" y="5" width="9" height="9" rx="2.5" fill="white"/>
        </svg>
      </div>
    </div>

    <div class="w-6 h-px bg-[#dfdfe2] my-2 flex-shrink-0"></div>

    <!-- Nav icon buttons -->
    <div class="flex flex-col gap-1 px-1.5 w-full">

      <button onclick="enterSection('dashboard')" title="Dashboard"
        class="w-full h-12 rounded-lg flex items-center justify-center hover:bg-gray-50">
        <div class="w-8 h-8 rounded-lg bg-[#f2f2f3] flex items-center justify-center">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="3" width="8" height="8" rx="1.5" fill="#7c6ce6"/>
            <rect x="13" y="3" width="8" height="8" rx="1.5" fill="#7c6ce6" fill-opacity="0.5"/>
            <rect x="3" y="13" width="8" height="8" rx="1.5" fill="#7c6ce6" fill-opacity="0.5"/>
            <rect x="13" y="13" width="8" height="8" rx="1.5" fill="#7c6ce6" fill-opacity="0.3"/>
          </svg>
        </div>
      </button>

      <button onclick="enterSection('review-growth')" title="Review Growth"
        class="w-full h-12 rounded-lg flex items-center justify-center hover:bg-gray-50">
        <div class="w-8 h-8 rounded-lg bg-[#f2f2f3] flex items-center justify-center">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="14" width="4" height="7" rx="1" fill="#fbbf24"/>
            <rect x="10" y="9" width="4" height="12" rx="1" fill="#fbbf24" fill-opacity="0.7"/>
            <rect x="17" y="5" width="4" height="16" rx="1" fill="#fbbf24" fill-opacity="0.4"/>
            <path d="M5 13L12 8L19 4" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
      </button>

      <button onclick="enterSection('brand-marketing')" title="Brand &amp; Marketing"
        class="w-full h-12 rounded-lg flex items-center justify-center hover:bg-gray-50">
        <div class="w-8 h-8 rounded-lg bg-[#f2f2f3] flex items-center justify-center">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" fill="#06b6d4" fill-opacity="0.2" stroke="#06b6d4" stroke-width="1.5" stroke-linejoin="round"/>
            <circle cx="9" cy="10" r="1.5" fill="#06b6d4"/>
            <circle cx="12" cy="10" r="1.5" fill="#06b6d4"/>
            <circle cx="15" cy="10" r="1.5" fill="#06b6d4"/>
          </svg>
        </div>
      </button>

      <button onclick="enterSection('buyer-intent')" title="Buyer Intent"
        class="w-full h-12 rounded-lg flex items-center justify-center hover:bg-gray-50">
        <div class="w-8 h-8 rounded-lg bg-[#f2f2f3] flex items-center justify-center">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L4 8.5l2 12h12l2-12z" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M4 8.5h16M8 8.5L12 2l4 6.5" stroke="#6366f1" stroke-width="1.5" stroke-linejoin="round"/>
          </svg>
        </div>
      </button>

      <button onclick="enterSection('market-intelligence')" title="Market Intelligence"
        class="w-full h-12 rounded-lg flex items-center justify-center hover:bg-gray-50">
        <div class="w-8 h-8 rounded-lg bg-[#f2f2f3] flex items-center justify-center">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="9" fill="#3b82f6" fill-opacity="0.12" stroke="#3b82f6" stroke-width="1.5"/>
            <path d="M3 12h18" stroke="#3b82f6" stroke-width="1.25"/>
            <ellipse cx="12" cy="12" rx="4.5" ry="9" stroke="#3b82f6" stroke-width="1.25"/>
          </svg>
        </div>
      </button>

      <button onclick="enterSection('integrations')" title="Integrations"
        class="w-full h-12 rounded-lg flex items-center justify-center hover:bg-gray-50">
        <div class="w-8 h-8 rounded-lg bg-[#f2f2f3] flex items-center justify-center">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M4 6h8v4H8v4H4V6z" fill="#f97316" fill-opacity="0.2" stroke="#f97316" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M12 6h8v8h-4v4h-4V6z" fill="#f97316" fill-opacity="0.15" stroke="#f97316" stroke-width="1.5" stroke-linejoin="round"/>
            <rect x="7.5" y="10" width="5" height="5" rx="1" fill="#f97316" fill-opacity="0.4"/>
          </svg>
        </div>
      </button>

    </div>

    <div class="w-6 h-px bg-[#dfdfe2] my-2 flex-shrink-0"></div>

    <div class="px-1.5 w-full">
      <button onclick="enterSection('settings')" title="Settings"
        class="w-full h-12 rounded-lg flex items-center justify-center hover:bg-gray-50">
        <div class="w-8 h-8 rounded-lg bg-[#f2f2f3] flex items-center justify-center">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.5">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
        </div>
      </button>
    </div>

    <div class="flex-1"></div>

    <div class="px-1.5 pb-3 w-full">
      <button class="w-8 h-8 rounded-full bg-[#f2f2f3] border border-[#dfdfe2] flex items-center justify-center mx-auto hover:bg-gray-200 transition-colors">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2.5" stroke-linecap="round">
          <path d="M9 18l6-6-6-6"/>
        </svg>
      </button>
    </div>
  </aside>

  <!-- ════════════════════════
       MAIN CONTENT AREA
  ════════════════════════ -->
  <div id="main-container" class="flex-1 flex flex-col overflow-hidden relative">

    <!-- ── HOME VIEW ── -->
    <div id="home-view" class="flex-1 overflow-auto">
      <div class="max-w-5xl mx-auto px-8 py-16">

        <!-- Greeting -->
        <div class="mb-10">
          <p class="text-xs font-bold tracking-widest uppercase text-gray-400 mb-2">ACME Cloud · MyG2</p>
          <h1 class="text-2xl font-bold text-[#201f23] mb-1.5">Good morning, Olivia</h1>
          <p class="text-sm text-[#6f6d78]">Where would you like to go?</p>
        </div>

        <!-- 4-column card grid -->
        <div class="grid grid-cols-2 xl:grid-cols-4 gap-4">

          <!-- Dashboard -->
          <button onclick="enterSection('dashboard')" class="nav-card bg-white rounded-2xl border border-gray-100 shadow-sm p-5 text-left">
            <div class="w-10 h-10 rounded-xl bg-[#f2f0f9] flex items-center justify-center mb-3">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <rect x="3" y="3" width="8" height="8" rx="1.5" fill="#7c6ce6"/>
                <rect x="13" y="3" width="8" height="8" rx="1.5" fill="#7c6ce6" fill-opacity="0.5"/>
                <rect x="3" y="13" width="8" height="8" rx="1.5" fill="#7c6ce6" fill-opacity="0.5"/>
                <rect x="13" y="13" width="8" height="8" rx="1.5" fill="#7c6ce6" fill-opacity="0.3"/>
              </svg>
            </div>
            <p class="text-sm font-bold text-[#201f23] mb-1">Dashboard</p>
            <p class="text-xs text-[#6f6d78] leading-relaxed mb-3">Activity overview and key performance metrics</p>
            <div class="flex flex-wrap gap-1.5">
              <span class="text-[10px] bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full font-medium">Overview</span>
              <span class="text-[10px] bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full font-medium">Reports</span>
            </div>
          </button>

          <!-- Review Growth -->
          <button onclick="enterSection('review-growth')" class="nav-card bg-white rounded-2xl border border-gray-100 shadow-sm p-5 text-left">
            <div class="w-10 h-10 rounded-xl bg-[#fef9ee] flex items-center justify-center mb-3">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <rect x="3" y="14" width="4" height="7" rx="1" fill="#fbbf24"/>
                <rect x="10" y="9" width="4" height="12" rx="1" fill="#fbbf24" fill-opacity="0.7"/>
                <rect x="17" y="5" width="4" height="16" rx="1" fill="#fbbf24" fill-opacity="0.4"/>
                <path d="M5 13L12 8L19 4" stroke="#fbbf24" stroke-width="1.75" stroke-linecap="round"/>
              </svg>
            </div>
            <p class="text-sm font-bold text-[#201f23] mb-1">Review Growth</p>
            <p class="text-xs text-[#6f6d78] leading-relaxed mb-3">Track reviews and run collection campaigns</p>
            <div class="flex flex-wrap gap-1.5">
              <span class="text-[10px] bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full font-medium">Performance</span>
              <span class="text-[10px] bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full font-medium">Campaigns</span>
            </div>
          </button>

          <!-- Brand & Marketing -->
          <button onclick="enterSection('brand-marketing')" class="nav-card bg-white rounded-2xl border border-gray-100 shadow-sm p-5 text-left">
            <div class="w-10 h-10 rounded-xl bg-[#ecfeff] flex items-center justify-center mb-3">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" fill="#06b6d4" fill-opacity="0.2" stroke="#06b6d4" stroke-width="1.75" stroke-linejoin="round"/>
                <circle cx="9" cy="10" r="1.5" fill="#06b6d4"/>
                <circle cx="12" cy="10" r="1.5" fill="#06b6d4"/>
                <circle cx="15" cy="10" r="1.5" fill="#06b6d4"/>
              </svg>
            </div>
            <p class="text-sm font-bold text-[#201f23] mb-1">Brand &amp; Marketing</p>
            <p class="text-xs text-[#6f6d78] leading-relaxed mb-3">Manage your G2 presence and content</p>
            <div class="flex flex-wrap gap-1.5">
              <span class="text-[10px] bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full font-medium">Profile</span>
              <span class="text-[10px] bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full font-medium">Trust Badges</span>
            </div>
          </button>

          <!-- Buyer Intent -->
          <button onclick="enterSection('buyer-intent')" class="nav-card bg-white rounded-2xl border border-gray-100 shadow-sm p-5 text-left">
            <div class="w-10 h-10 rounded-xl bg-[#eef2ff] flex items-center justify-center mb-3">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <path d="M12 2L4 8.5l2 12h12l2-12z" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-width="1.75" stroke-linejoin="round"/>
                <path d="M4 8.5h16M8 8.5L12 2l4 6.5" stroke="#6366f1" stroke-width="1.75" stroke-linejoin="round"/>
              </svg>
            </div>
            <p class="text-sm font-bold text-[#201f23] mb-1">Buyer Intent</p>
            <p class="text-xs text-[#6f6d78] leading-relaxed mb-3">Identify accounts researching your category</p>
            <div class="flex flex-wrap gap-1.5">
              <span class="text-[10px] bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full font-medium">Intent Signals</span>
              <span class="text-[10px] bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full font-medium">Accounts</span>
            </div>
          </button>

          <!-- Market Intelligence -->
          <button onclick="enterSection('market-intelligence')" class="nav-card bg-white rounded-2xl border border-gray-100 shadow-sm p-5 text-left">
            <div class="w-10 h-10 rounded-xl bg-[#eff6ff] flex items-center justify-center mb-3">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="9" fill="#3b82f6" fill-opacity="0.12" stroke="#3b82f6" stroke-width="1.75"/>
                <path d="M3 12h18" stroke="#3b82f6" stroke-width="1.25"/>
                <ellipse cx="12" cy="12" rx="4.5" ry="9" stroke="#3b82f6" stroke-width="1.25"/>
              </svg>
            </div>
            <p class="text-sm font-bold text-[#201f23] mb-1">Market Intelligence</p>
            <p class="text-xs text-[#6f6d78] leading-relaxed mb-3">Competitive insights and market trends</p>
            <div class="flex flex-wrap gap-1.5">
              <span class="text-[10px] bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full font-medium">Categories</span>
              <span class="text-[10px] bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full font-medium">Competitors</span>
            </div>

          <!-- Integrations -->
          <button onclick="enterSection('integrations')" class="nav-card bg-white rounded-2xl border border-gray-100 shadow-sm p-5 text-left">
            <div class="w-10 h-10 rounded-xl bg-[#fff7ed] flex items-center justify-center mb-3">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <path d="M4 6h8v4H8v4H4V6z" fill="#f97316" fill-opacity="0.2" stroke="#f97316" stroke-width="1.75" stroke-linejoin="round"/>
                <path d="M12 6h8v8h-4v4h-4V6z" fill="#f97316" fill-opacity="0.15" stroke="#f97316" stroke-width="1.75" stroke-linejoin="round"/>
                <rect x="7.5" y="10" width="5" height="5" rx="1" fill="#f97316" fill-opacity="0.4"/>
              </svg>
            </div>
            <p class="text-sm font-bold text-[#201f23] mb-1">Integrations</p>
            <p class="text-xs text-[#6f6d78] leading-relaxed mb-3">Connect your tools and manage apps</p>
            <div class="flex flex-wrap gap-1.5">
              <span class="text-[10px] bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full font-medium">Connected Apps</span>
              <span class="text-[10px] bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full font-medium">Marketplace</span>
            </div>
          </button>

          <!-- Settings -->
          <button onclick="enterSection('settings')" class="nav-card bg-white rounded-2xl border border-gray-100 shadow-sm p-5 text-left">
            <div class="w-10 h-10 rounded-xl bg-[#f9fafb] flex items-center justify-center mb-3">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="1.75">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
              </svg>
            </div>
            <p class="text-sm font-bold text-[#201f23] mb-1">Settings</p>
            <p class="text-xs text-[#6f6d78] leading-relaxed mb-3">Account, team, and billing preferences</p>
            <div class="flex flex-wrap gap-1.5">
              <span class="text-[10px] bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full font-medium">Profile</span>
              <span class="text-[10px] bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full font-medium">Team</span>
            </div>
          </button>

        </div>
      </div>
    </div><!-- #home-view -->

    <!-- ── SECTION VIEW (hidden initially) ── -->
    <div id="section-view" class="absolute inset-0 bg-[#f5f4fb] flex flex-col" style="display:none;">

      <!-- Section top bar -->
      <div class="bg-white flex items-center h-14 px-5 gap-3 flex-shrink-0"
        style="border-bottom: 0.5px solid #dfdfe2; box-shadow: 0 1px 2px rgba(32,31,35,0.05);">

        <!-- Back button -->
        <button onclick="exitSection()"
          class="flex items-center gap-1.5 text-sm font-semibold text-[#6f6d78] hover:text-[#201f23] transition-colors flex-shrink-0 group">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 5l-7 7 7 7"/>
          </svg>
          Back
        </button>

        <div class="w-px h-5 bg-[#dfdfe2] flex-shrink-0"></div>

        <!-- Section icon + title -->
        <div class="flex items-center gap-2.5 flex-shrink-0">
          <div id="section-header-icon" class="w-7 h-7 rounded-lg flex items-center justify-center flex-shrink-0"></div>
          <span id="section-header-title" class="text-base font-bold text-[#201f23]"></span>
        </div>

        <div class="flex-1"></div>

        <!-- Utility items (right side of header in section state) -->
        <div class="flex items-center gap-3 flex-shrink-0">
          <button class="w-7 h-7 rounded-full bg-blue-50 flex items-center justify-center hover:bg-blue-100 transition-colors">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round">
              <circle cx="12" cy="12" r="10"/>
              <path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/>
              <circle cx="12" cy="17" r="0.5" fill="#3b82f6"/>
            </svg>
          </button>
          <button class="relative">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#374151" stroke-width="1.8" stroke-linecap="round">
              <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
              <path d="M13.73 21a2 2 0 01-3.46 0"/>

function enterSection(id) {
  const s = SECTIONS[id];
  if (!s) return;

  // Populate section header
  const iconEl = document.getElementById('section-header-icon');
  iconEl.style.background = s.bg;
  iconEl.innerHTML = s.icon;
  document.getElementById('section-header-title').textContent = s.name;

  // Build tab bar
  const tabBar = document.getElementById('tab-bar');
  tabBar.innerHTML = s.tabs.map((tab, i) =>
    `<button class="tab-pill text-sm font-semibold px-3 py-1.5 rounded-full text-[#6f6d78] hover:bg-gray-100 ${i === 0 ? 'is-active' : ''}"
      onclick="selectTab(this, '${tab.replace(/'/g, "\\'")}', '${id}')"
    >${tab}</button>`
  ).join('');

  // Populate content placeholder with first tab
  setContentPlaceholder(s.tabs[0], s.name, s.bg, s.bigIcon);

  // Transitions: collapse sidebar + fade out home + show section
  document.getElementById('sidebar').classList.add('is-collapsed');
  const homeView = document.getElementById('home-view');
  homeView.style.opacity = '0';
  homeView.style.pointerEvents = 'none';
  document.getElementById('utility-bar').classList.add('is-hidden');

  setTimeout(() => {
    homeView.style.display = 'none';
    const sv = document.getElementById('section-view');
    sv.style.display = 'flex';
    requestAnimationFrame(() => sv.classList.add('is-visible'));
  }, 220);
}

function exitSection() {
  const sv = document.getElementById('section-view');
  sv.classList.remove('is-visible');

  setTimeout(() => {
    sv.style.display = 'none';
    const homeView = document.getElementById('home-view');
    homeView.style.display = '';
    homeView.style.opacity = '0';
    homeView.style.pointerEvents = 'auto';
    document.getElementById('sidebar').classList.remove('is-collapsed');
    document.getElementById('utility-bar').classList.remove('is-hidden');
    requestAnimationFrame(() => {
      homeView.style.transition = 'opacity 0.25s ease';
      homeView.style.opacity = '1';
    });
  }, 200);
}

function selectTab(el, tabName, sectionId) {
  document.querySelectorAll('.tab-pill').forEach(t => t.classList.remove('is-active'));
  el.classList.add('is-active');
  const s = SECTIONS[sectionId];
  setContentPlaceholder(tabName, s.name, s.bg, s.bigIcon);
}

function setContentPlaceholder(tabName, sectionName, bg, bigIcon) {
  const iconEl = document.getElementById('content-icon');
  iconEl.style.background = bg;
  iconEl.innerHTML = bigIcon;
  document.getElementById('content-tab').textContent = tabName;
  document.getElementById('content-section').textContent = sectionName;
}
